name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (Windows)
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'UCM v__VERSION__'
          releaseBody: |
            ## Ultimate CLI Manager

            Automated release built from commit `{{commitSHA}}`.

            See the [changelog](./CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --bundles msi,nsis

      - name: Locate and prepare portable exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target -Recurse -Filter "ultimate-cli-manager.exe" -File |
                Where-Object { $_.DirectoryName -notmatch '[\\/](deps|build)[\\/]' } |
                Select-Object -First 1
          if (-not $exe) {
            Write-Error "ultimate-cli-manager.exe non trovato in src-tauri/target"
            exit 1
          }
          Write-Host "Trovato exe: $($exe.FullName)"
          Copy-Item -Path $exe.FullName -Destination ucm_portable.exe -Force
          Get-Item ucm_portable.exe | Select-Object FullName, Length

      - name: Upload portable exe
        uses: softprops/action-gh-release@v2
        with:
          files: ucm_portable.exe
          fail_on_unmatched_files: true
